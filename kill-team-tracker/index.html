<!DOCTYPE html>
<html>
<head>
<title>KT Tracker</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Display:wght@600&display=swap" rel="stylesheet">

<style>
/*! normalize.css v8.0.1 | MIT License | github.com/necolas/normalize.css */
html {
  line-height: 1.15;
  -webkit-text-size-adjust: 100%;
}
body {
  margin: 0;
}
main {
  display: block;
}
h1 {
  font-size: 2em;
  margin: 0.67em 0;
}
hr {
  box-sizing: content-box;
  height: 0;
  overflow: visible;
}
pre {
  font-family: monospace, monospace;
  font-size: 1em;
}
a {
  background-color: transparent;
}
abbr[title] {
  border-bottom: none;
  text-decoration: underline;
  text-decoration: underline dotted;
}
b,
strong {
  font-weight: bolder;
}
code,
kbd,
samp {
  font-family: monospace, monospace;
  font-size: 1em;
}
small {
  font-size: 80%;
}
sub,
sup {
  font-size: 75%;
  line-height: 0;
  position: relative;
  vertical-align: baseline;
}
sub {
  bottom: -0.25em;
}
sup {
  top: -0.5em;
}
img {
  border-style: none;
}
button,
input,
optgroup,
select,
textarea {
  font-family: inherit;
  font-size: 100%;
  line-height: 1.15;
  margin: 0;
}
button,
input {
  overflow: visible;
}
button,
select {
  text-transform: none;
}
button,
[type="button"],
[type="reset"],
[type="submit"] {
  -webkit-appearance: button;
}
button::-moz-focus-inner,
[type="button"]::-moz-focus-inner,
[type="reset"]::-moz-focus-inner,
[type="submit"]::-moz-focus-inner {
  border-style: none;
  padding: 0;
}
button:-moz-focusring,
[type="button"]:-moz-focusring,
[type="reset"]:-moz-focusring,
[type="submit"]:-moz-focusring {
  outline: 1px dotted ButtonText;
}
fieldset {
  padding: 0.35em 0.75em 0.625em;
}
legend {
  box-sizing: border-box;
  color: inherit;
  display: table;
  max-width: 100%;
  padding: 0;
  white-space: normal;
}
progress {
  vertical-align: baseline;
}
textarea {
  overflow: auto;
}
[type="checkbox"],
[type="radio"] {
  box-sizing: border-box;
  padding: 0;
}
[type="number"]::-webkit-inner-spin-button,
[type="number"]::-webkit-outer-spin-button {
  height: auto;
}
[type="search"] {
  -webkit-appearance: textfield;
  outline-offset: -2px;
}
[type="search"]::-webkit-search-decoration {
  -webkit-appearance: none;
}
::-webkit-file-upload-button {
  -webkit-appearance: button;
  font: inherit;
}
details {
  display: block;
}
summary {
  display: list-item;
}
template {
  display: none;
}
[hidden] {
  display: none;
}
/* end normalize */

html {
	height: 100%;
}

body {
	font-family: 'Big Shoulders Stencil Display', sans-serif;
	font-size: 45px;
	background-image: url('white-texture-bg.png');
	background-repeat: no-repeat;
	background-size: cover;
}

button {
	display: inline-block;
	width: 40px;
	height: 40px;
	border-radius: 50%;
	background: #ff4f02;
	color: #fff;
	border: none;
	font-size: 40px;
	line-height: 0;
	cursor: pointer;
}

.container {
	max-width: 1200px;
	margin: 0 auto;
	padding: 40px;
	text-align: center;
}

.players {
	display: flex;
}

.player1,
.player2 {
	width: 50%;
}

.tp, .cp, .vp {
	display: flex;
	align-items: center;
	justify-content: center;
	margin-bottom: 40px;
}

.tp span, .cp span, .vp span {
	display: inline-block;
	width: 60px;
	font-size: 60px;
}

.disclaimer {
	padding: 20px 0 0 0;
	font-size: 12px;
}
</style>
</head>
<body>

<div class="container">

	<img src="killteam-logo.png" alt="" style="max-width:400px;"><br>

	Turning Point<br>
	<div class="tp">
		<button id="vp-down">-</button> <span id="vp">1</span> <button id="vp-up">+</button>
	</div>
	
	<div class="players">
	
		<div class="player1">
			
			<span style="color:#ff4f02;">Kill Team 1</span><br>
			
			Command Points<br>
			<div class="cp">
				<button id="p1-cp-down">-</button> <span id="p1-cp">2</span> <button id="p1-cp-up">+</button>
			</div>
			
			Victory Points<br>
			<div class="vp">
				<button id="p1-vp-down">-</button> <span id="p1-vp">0</span> <button id="p1-vp-up">+</button>
			</div>
		
		</div><!-- /player1 -->
		
		
		<div class="player2">
		
			<span style="color:#ff4f02;">Kill Team 2</span><br>
			
			Command Points<br>
			<div class="cp">
				<button id="p2-cp-down">-</button> <span id="p2-cp">2</span> <button id="p2-cp-up">+</button>
			</div>
			
			Victory Points<br>
			<div class="vp">
				<button id="p2-vp-down">-</button> <span id="p2-vp">0</span> <button id="p2-vp-up">+</button>
			</div>
		
		</div><!-- /player2 -->
	
	</div><!-- /players -->
	
	<div class="disclaimer">This web page is completely unofficial and in no way endorsed by Games Workshop.</div>

</div><!-- /container -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
<script>
$(function() {

	$('#vp-up').click(function() {
		$('#vp').html(function(i, val) { return val*1+1 });
	});
	
	$('#vp-down').click(function() {
		$('#vp').html(function(i, val) { return val*1-1 });
	});
	
	$('#p1-cp-up').click(function() {
		$('#p1-cp').html(function(i, val) { return val*1+1 });
	});
	
	$('#p1-cp-down').click(function() {
		$('#p1-cp').html(function(i, val) { return val*1-1 });
	});
	
	$('#p1-vp-up').click(function() {
		$('#p1-vp').html(function(i, val) { return val*1+1 });
	});
	
	$('#p1-vp-down').click(function() {
		$('#p1-vp').html(function(i, val) { return val*1-1 });
	});
	
	$('#p2-cp-up').click(function() {
		$('#p2-cp').html(function(i, val) { return val*1+1 });
	});
	
	$('#p2-cp-down').click(function() {
		$('#p2-cp').html(function(i, val) { return val*1-1 });
	});
	
	$('#p2-vp-up').click(function() {
		$('#p2-vp').html(function(i, val) { return val*1+1 });
	});
	
	$('#p2-vp-down').click(function() {
		$('#p2-vp').html(function(i, val) { return val*1-1 });
	});
	
	// prompt user to verify page reload so we don't lose points tracking
	window.onbeforeunload = function() {
		return "Are you sure you want to reload the page? Current point tracking will be lost.";
	}
	
});
</script>
</body>
</html>
