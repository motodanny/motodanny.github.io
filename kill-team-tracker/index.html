<!DOCTYPE html>
<html lang="en">
<head>
<title>KT Tracker</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">

<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Display:wght@600" rel="stylesheet">

<style>

/* disable double-tap to zoom */
* {
  touch-action: manipulation;
}

html {
  height: 100%;
}
body {
  font-family: 'Big Shoulders Stencil Display', sans-serif;
  font-size: 45px;
  background-color: #ededed;
  background-image: url('white-texture-bg.png');
  background-repeat: no-repeat;
  background-size: cover;
}
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px;
  text-align: center;
}
button {
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 50%;
  background: #ff4f02;
  color: #fff;
  border: unset;
  line-height: 0;
  cursor: pointer;
}
.players {
  display: flex;
}
.player1, .player2 {
  width: 50%;
}
.kill-team-name {
  color: #ff4f02;
}
.incrementer {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 40px;
}
.incrementer span {
  width: 100px;
  font-size: 60px;
}
.incrementer span.tp {
  font-size: 66px;
}
footer {
  padding: 0 40px;
  font-size: 26px;
  text-align: center;
}
footer a {
  color: #000;
  text-decoration: none;
  transition: all .2s ease-out;
}
footer a:hover {
  color: #ff4f02;
}
.disclaimer {
  width: 100%;
  padding: 20px 0 40px;
  font-size: 12px;
}
.arrow {
  display: inline-block;
  margin-top: 5px;
  font-family: Arial, sans-serif;
  font-size: 18px;
  vertical-align: middle;
}
.skull {
  cursor: pointer;
  vertical-align: middle;
}
.faqs-link,
.downloads-link {
  margin: 0 30px;
  white-space: nowrap;
  vertical-align: middle;
  display: none;
}
@media screen and (max-width: 768px) {
  .players {
    flex-wrap: wrap;
  }
  .player1, .player2 {
    width: 100%;
    padding-top: 40px;
    border-top: 5px solid #ccc;
  }
  footer a {
    display: block;
  }
}
</style>
</head>
<body>

<main>
  <img src="killteam-logo.png" alt="" style="width:100%; max-width:400px; margin-bottom:25px;"><br>

  Turning Point<br>
  <div class="incrementer">
    <button class="down">-</button><span data-value="1" class="tp">1</span><button class="up">+</button>
  </div>

  <div class="players">

    <!-- 1 -->
    <div class="player1">
      <span class="kill-team-name">Kill Team 1</span><br>

      Command Points<br>
      <div class="incrementer">
        <button class="down">-</button><span data-value="2">2</span><button class="up">+</button>
      </div>

      Victory Points<br>
      <div class="incrementer">
        <button class="down">-</button><span data-value="0">0</span><button class="up">+</button>
      </div>
    </div>

    <!-- 2 -->
    <div class="player2">
      <span class="kill-team-name">Kill Team 2</span><br>

      Command Points<br>
      <div class="incrementer">
        <button class="down">-</button><span data-value="2">2</span><button class="up">+</button>
      </div>

      Victory Points<br>
      <div class="incrementer">
        <button class="down">-</button><span data-value="0">0</span><button class="up">+</button>
      </div>
    </div>

  </div>

</main>

<footer>

  <span class="arrow">&gt;</span><a href="https://www.warhammer-community.com/faqs/#kill-team" target="_blank" class="faqs-link">Kill Team FAQs</a>
  <a class="skull">&#9760;</a>
  <a href="https://www.warhammer-community.com/downloads/#kill-team" target="_blank" class="downloads-link">Kill Team Downloads</a><span class="arrow">&lt;</span>

  <div class="disclaimer">This web page is completely unofficial and in no way endorsed by Games Workshop Limited.</div>

</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
<script>
$(function() {

  // thanks for the JS hurst! for the emperor!
  $('.incrementer button').click(function(){
    var upOrDown = $(this).attr('class');
    var currentValue = $(this).siblings('[data-value]').attr('data-value');
    if(upOrDown == 'down'){
      currentValue--
    } else {
      currentValue++
    }
    $(this).siblings('[data-value]').attr('data-value',currentValue);
    $(this).siblings('[data-value]').text(currentValue);
  });

  $('.kill-team-name').click(function(){
    var thisDiv = $(this);
    var ktName = prompt("Enter your Kill Team name:", "Kill Team ");
    if (ktName != null) {
      thisDiv.text(ktName);
    }
  });

  // verify page reload to prevent accidental points reset
  window.onbeforeunload = function(){
    return "Are you sure you want to leave the page and reset all points?";
  }

  // links toggle
  $('.skull').click(function(){
    $('.faqs-link,.downloads-link').animate({width: 'toggle'});
  });

});
</script>
</body>
</html>
